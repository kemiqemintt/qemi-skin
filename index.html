<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qemi skin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Poppins,sans-serif;
color:#fff;
background:linear-gradient(-45deg,#12081d,#2d1248,#5b1d72,#a336c2);
background-size:400% 400%;
animation:bg 12s ease infinite;
}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
.container{
width:min(1100px,90%);
margin:auto;
padding:60px 0;
}
.hero{
text-align:center;
margin-bottom:50px;
}
.hero h1{
font-size:60px;
font-weight:700;
}
.hero p{
margin-top:10px;
opacity:.8;
}

.card{
display:flex;
flex-wrap:wrap;
gap:30px;
align-items:center;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
padding:35px;
box-shadow:0 20px 45px rgba(0,0,0,.35);
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
border:4px solid #ff7df5;
box-shadow:0 0 25px #ff63ef;
}

.info{
flex:1;
}

.info h2{
font-size:38px;
margin-bottom:8px;
}

.info p{
opacity:.9;
line-height:1.8;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:25px;
}

.btn{
padding:15px 28px;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:600;
transition:.25s;
}

.download{
background:#ff4fd8;
}

.profile{
background:#7c4dff;
}

.btn:hover{
transform:translateY(-3px) scale(1.03);
filter:brightness(1.15);
}

.gallery-title{
margin:60px 0 25px;
text-align:center;
font-size:34px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:18px;
cursor:pointer;
transition:.3s;
box-shadow:0 15px 30px rgba(0,0,0,.35);
}

.gallery img:hover{
transform:scale(1.03);
}

footer{
margin:60px 0 20px;
text-align:center;
opacity:.7;
}

@media(max-width:750px){
.card{
flex-direction:column;
text-align:center;
}
.buttons{
justify-content:center;
}
.hero h1{
font-size:42px;
}
}
</style>

</head>
<body>

<div class="container">

<div class="hero">
<h1>Qemi Skin</h1>
<p>Minimal • 4K-only • osu!mania</p>
</div>

<div class="card">

<img class="avatar"
src="https://a.ppy.sh/38033628">

<div class="info">

<h2>Qemi</h2>

<p>
Hi! I'm Qemi, an osu!mania player 
</p>

<div class="buttons">

<a class="btn download"
href="tekito2 qemi edit.osk">
⬇ Download Skin
</a>

<a class="btn profile"
target="_blank"
href="https://osu.ppy.sh/users/38033628">
🎮 osu! Profile
</a>

</div>

</div>

</div>

<h2 class="gallery-title">Screenshots</h2>

<div class="gallery">

<img src="screenshot245.png">

<img src="screenshot246.png">

</div>

<footer>

Made by Qemi

</footer>

</div>

</body>
</html>
